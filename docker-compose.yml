services:
  postgres:
    image: pgvector/pgvector:pg16

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ragops

    ports:
      - "5432:5432"

  fastapi:
    build: .

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --reload

    depends_on:
      - postgres